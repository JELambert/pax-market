name: Validate PAX Pack

on:
  pull_request:
    branches: [main]
    paths: ['pax/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate changed packs
        id: validate
        run: |
          set -uo pipefail
          # Find pack directories changed in this PR.
          changed_packs=$(
            git diff --name-only origin/main...HEAD -- 'pax/' \
              | awk -F/ 'NF>=2 && $1=="pax" {print $2}' \
              | sort -u
          )
          if [ -z "$changed_packs" ]; then
            echo "No pax/ changes in this PR — skipping validation."
            echo "skipped=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Validating $(echo "$changed_packs" | wc -l | tr -d ' ') changed pack(s):"
          echo "$changed_packs" | sed 's/^/  /'
          # Aggregate per-pack JSON into a single report file.
          : > validate-report.jsonl
          fail=0
          for pack in $changed_packs; do
            dir="pax/$pack"
            if [ ! -d "$dir" ]; then
              echo "  (deleted: $pack — skipping)"
              continue
            fi
            if ! python3 scripts/validate_pax.py "$dir" --json >> validate-report.jsonl 2> >(tee -a validate-stderr.log >&2); then
              fail=1
            fi
          done
          # Mirror to log for human-readable inline view.
          for pack in $changed_packs; do
            dir="pax/$pack"
            [ -d "$dir" ] || continue
            python3 scripts/validate_pax.py "$dir" || true
          done
          if [ "$fail" -ne 0 ]; then
            echo "fail=1" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "fail=0" >> "$GITHUB_OUTPUT"

      - name: Build markdown report
        if: always() && steps.validate.outputs.skipped != '1'
        id: report
        run: |
          set -euo pipefail
          if [ ! -s validate-report.jsonl ]; then
            echo "No validation report produced (script failure?). Skipping comment."
            exit 0
          fi
          python3 - <<'PY' > comment.md
          import json, os
          marker = "<!-- pax-validator:report -->"
          lines = [l for l in open("validate-report.jsonl") if l.strip()]
          results = [json.loads(l) for l in lines]
          ok_packs   = [r for r in results if r["ok"]]
          fail_packs = [r for r in results if not r["ok"]]
          out = [marker, "## PAX Validator Report", ""]
          if not fail_packs:
              out.append(f"✓ All {len(ok_packs)} changed pack(s) passed validation.")
          else:
              out.append(f"✗ **{len(fail_packs)} pack(s) failed**, {len(ok_packs)} passed.")
              out.append("")
              out.append("| Pack | Errors |")
              out.append("|---|---|")
              for r in fail_packs:
                  out.append(f"| `{r['pack']}` | {len(r['errors'])} |")
              out.append("")
              for r in fail_packs:
                  out.append(f"### `{r['pack']}` ({len(r['errors'])} error(s))")
                  out.append("")
                  out.append("```")
                  for e in r["errors"][:50]:
                      out.append(f"- {e}")
                  if len(r["errors"]) > 50:
                      out.append(f"... and {len(r['errors']) - 50} more")
                  out.append("```")
                  out.append("")
          out.append("")
          out.append("<sub>Generated by `scripts/validate_pax.py` against `docs/PAX_CREATION_GUIDE.md`. See JELambert/pax-market#85.</sub>")
          print("\n".join(out))
          PY
          echo "wrote $(wc -l < comment.md) lines to comment.md"

      - name: Find or create PR comment (idempotent)
        if: always() && steps.validate.outputs.skipped != '1' && hashFiles('comment.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Find any existing comment with our marker.
          existing=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | startswith("<!-- pax-validator:report -->")) | .id' \
            | head -n1 || true)
          body=$(cat comment.md)
          if [ -n "$existing" ]; then
            echo "Editing existing comment $existing"
            gh api -X PATCH "repos/$REPO/issues/comments/$existing" -f body="$body" >/dev/null
          else
            echo "Creating new comment"
            gh api -X POST "repos/$REPO/issues/$PR_NUMBER/comments" -f body="$body" >/dev/null
          fi

      - name: Fail the job if any pack failed
        if: steps.validate.outputs.fail == '1'
        run: |
          echo "::error::One or more PAX packs failed validation. See PR comment for details."
          exit 1
