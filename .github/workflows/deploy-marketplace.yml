name: Deploy PAX Marketplace

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Generate marketplace content from packs/
        run: python3 scripts/generate-from-git.py

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo
        run: hugo --minify

      - name: Verify build
        run: |
          if [ ! -f public/index.html ]; then
            echo "ERROR: Hugo build produced no index.html"
            exit 1
          fi
          echo "Build OK: $(find public -name '*.html' | wc -l) HTML files"

      - name: Deploy to CT 110
        if: github.event_name == 'push'
        env:
          DEPLOY_KEY: ${{ secrets.CT110_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "CT110_SSH_KEY not set — skipping rsync deploy"
            echo "Site built successfully in public/"
          else
            mkdir -p ~/.ssh
            echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh-keyscan -H 192.168.68.110 >> ~/.ssh/known_hosts 2>/dev/null
            rsync -a --delete public/ root@192.168.68.110:/var/www/marketplace/
            echo "Deployed to CT 110"
          fi
