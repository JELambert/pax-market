name: Verify Marketplace Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "build-verify"
  cancel-in-progress: true

jobs:
  build-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Generate marketplace content from pax/
        run: python3 scripts/generate-registry.py

      - name: Verify build output
        run: |
          if [ ! -f dist/registry.json ]; then
            echo "ERROR: dist/registry.json missing"
            exit 1
          fi
          if [ ! -f dist/full-catalog.json ]; then
            echo "ERROR: dist/full-catalog.json missing"
            exit 1
          fi
          PACK_COUNT=$(find dist/pax -name '*.pax.tar.gz' 2>/dev/null | wc -l | tr -d ' ')
          echo "Build OK: ${PACK_COUNT} pack archives in dist/"
