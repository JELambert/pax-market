name: Verify Marketplace Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "build-verify"
  cancel-in-progress: true

jobs:
  build-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Generate marketplace content from pax/
        run: python3 scripts/generate-registry.py

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo
        run: hugo --minify

      - name: Verify build output
        run: |
          if [ ! -f public/index.html ]; then
            echo "ERROR: Hugo build produced no index.html"
            exit 1
          fi
          if [ ! -f public/registry.json ]; then
            echo "ERROR: registry.json missing from public/"
            exit 1
          fi
          HTML_COUNT=$(find public -name '*.html' | wc -l | tr -d ' ')
          PACK_COUNT=$(find public/pax -name '*.pax.tar.gz' 2>/dev/null | wc -l | tr -d ' ')
          echo "Build OK: ${HTML_COUNT} HTML files, ${PACK_COUNT} pack archives"
