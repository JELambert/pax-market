description: Why false beliefs persist even after correction — the cognitive science
  of misinformation. Covers the continued influence effect, the debunked "backfire
  effect," inoculation theory, source credibility decay, and the illusory truth effect.
  Integrates experimental psychology, communication science, and computational propaganda
  research to map when and why corrections fail.
