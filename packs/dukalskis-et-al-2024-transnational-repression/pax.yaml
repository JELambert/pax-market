  constructs:
  - transnational_repression_binary
  - transnational_repression_count
  - domestic_repression_cli
  - diplomatic_capacity_abroad
  - state_capacity_latent
  - polity_score
  - leader_tenure
  engines:
  - logistic_regression
  - ols_regression
  findings:
  - dukalskis_et_al_2024_0
