name: batista-et-al-2025-brain-drain-gain
version: "1.0.0"
description: >
  Causal-inference review of the effects of high-skilled emigration on origin
  countries. Synthesizes recent quasi-experimental evidence (DID, RD, SSIV, RA)
  on brain drain vs. brain gain mechanisms across human capital, innovation,
  trade/FDI, norms, political institutions, and population health.
