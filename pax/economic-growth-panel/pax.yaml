description: Determinants of long-run economic growth including physical capital accumulation,
  human capital, population growth, and total factor productivity. Built on Solow
  (1956), Barro (1991), and Mankiw-Romer-Weil (1992).
name: economic-growth-panel
pax_type: field
provides:
  constructs:
  - gdp_per_capita
  - physical_capital
  - human_capital
  - population_growth_rate
  - total_factor_productivity
  - convergence_rate
  engines:
  - ols_regression
  - ridge_regression
  - correlation_matrix
  - instrumental_variables
  findings:
  - solow_1956_0
  - solow_1956_1
  - mankiw_romer_weil_1992_2
  - barro_1991_3
  playbooks:
  - quick_start
  propositions: []
schema_version: '1.0'
version: 1.0.0
