description: Global supply chain risk management — vulnerability assessment, disruption
  modeling, resilience quantification, spatial contagion, network cascading failure,
  time series trade forecasting, ML risk prediction, and mitigation strategy evaluation
  across multi-tier networks. Integrates academic research, industry standards (ISO
  28000, NIST C-SCRM), and applied analytical methods (spatial econometrics, network
  science, simulation, machine learning).
