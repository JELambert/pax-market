description: 'Machine learning pipeline for supply chain disruption prediction: train
  ensemble models (RF, XGBoost), evaluate with proper cross-validation, generate SHAP
  explanations, and test anomaly detection. Includes causal forest for heterogeneous
  intervention effects.'
display_name: ML Risk Classification & Explainability
id: ml_risk_classification
steps:
- action: data_quality_gate
  display_name: ML Data Quality Gate
  id: ml_data_quality
  on_failure: abort
  params:
    constructs:
    - supply_chain_disruption_binary
    - supplier_financial_health
    - lead_time_variability
    - geographic_concentration_risk
    - network_betweenness_centrality
    max_missing_pct: 0.1
    min_observations: 200
    min_positive_class_pct: 0.05
    require_balanced_classes: false
  step: 1
- action: analyze
  display_name: Feature Engineering & Selection
  id: feature_engineering
  params:
    create_interaction_terms: true
    create_lag_features: true
    handle_imbalance: smote
    lag_periods:
    - 1
    - 3
    - 6
  step: 2
- depends_on:
  - feature_engineering
  display_name: Random Forest — Disruption Prediction
  engine: random_forest
  expected_results:
    auc:
      min_value: 0.7
  id: random_forest_model
  params:
    cv_folds: 5
    n_estimators: 500
    outcome: supply_chain_disruption_binary
    predictors:
    - supplier_financial_health
    - lead_time_variability
    - geographic_concentration_risk
    - network_betweenness_centrality
    - geopolitical_risk_index
    - climate_exposure_score
    - tier_depth
    - inventory_buffer_ratio
    scoring: roc_auc
  step: 3
- depends_on:
  - feature_engineering
  display_name: XGBoost — Gradient Boosting Benchmark
  engine: gradient_boosting
  id: xgboost_model
  params:
    cv_folds: 5
    early_stopping_rounds: 50
    outcome: supply_chain_disruption_binary
    predictors:
    - supplier_financial_health
    - lead_time_variability
    - geographic_concentration_risk
    - network_betweenness_centrality
    - geopolitical_risk_index
    - climate_exposure_score
    - tier_depth
    - inventory_buffer_ratio
    scoring: roc_auc
  step: 4
- depends_on:
  - xgboost_model
  display_name: SHAP Feature Importance & Explanations
  engine: shap_explainer
  id: shap_explanation
  params:
    model_source: xgboost_model
    plot_types:
    - summary
    - dependence
    - force
    top_features: 10
  step: 5
- display_name: Isolation Forest — Anomaly Detection (Unsupervised)
  engine: isolation_forest
  id: anomaly_detection
  params:
    contamination: 0.05
    features:
    - lead_time_variability
    - supplier_financial_health
    - trade_flow_volume
    - port_congestion_index
    n_estimators: 200
  step: 6
- depends_on:
  - random_forest_model
  display_name: Causal Forest — Heterogeneous Treatment Effects
  engine: causal_forest
  id: causal_intervention
  params:
    covariates:
    - geographic_concentration_risk
    - tier_depth
    - supplier_financial_health
    n_estimators: 500
    outcome: supply_chain_disruption_binary
    treatment: supplier_diversification
  skip_if: insufficient_quasi_experimental_variation
  step: 7
- action: analyze
  depends_on:
  - random_forest_model
  - xgboost_model
  - anomaly_detection
  display_name: Model Comparison & Recommendation
  id: model_comparison
  params:
    compare_models: true
    generate_risk_scores: true
    recommend_production_model: true
  step: 8
