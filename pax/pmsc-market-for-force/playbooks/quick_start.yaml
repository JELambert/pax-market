description: Basic analysis workflow for the pmsc_market_for_force domain.
display_name: Quick Start — Pmsc Market For Force
estimated_runtime: 1–3 minutes
id: quick_start
steps:
- action: run_engine
  compare_to_kb: true
  display_name: Correlation Matrix
  engine: correlation_matrix
  id: correlation
  on_failure: continue
  params:
    variables:
    - pmsc_presence
    - pmsc_type
    - pmsc_government_linkage
    - pmsc_service_spectrum
    - pmsc_market_competition
    - conflict_intensity_pmsc
  step: 1
- action: run_engine
  compare_to_kb: true
  display_name: Primary Model
  engine: logistic_regression
  id: primary_model
  on_failure: abort
  params:
    outcome: conflict_intensity_pmsc
    predictors:
    - pmsc_presence
    - pmsc_type
    - pmsc_government_linkage
  step: 2
