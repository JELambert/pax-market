name: smith-lambert-2026-beigesage
version: "1.0.0"
description: >
  Comparative evaluation of LLMs (GPT-4o, Llama 3.1, Phi3, Gemma2), a fine-tuned
  RoBERTa model (BeigeSage), and a lexical baseline (VADER) for sentiment
  classification of Federal Reserve Beige Book reports across positive, negative,
  and mixed classes. Demonstrates that domain-specific fine-tuning yields the
  best classification performance and that BeigeSage sentiment correlates with
  macroeconomic indicators (GDP growth, unemployment, CPI).
