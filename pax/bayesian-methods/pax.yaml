description: 'Bayesian methods engine pack covering core concepts (priors, posteriors,
  credible intervals, conjugacy), inference algorithms (MCMC, HMC, NUTS, variational
  inference, ABC), hierarchical/multilevel models, and model checking (posterior predictive
  checks, Bayes factors, effective sample size). Bundles authoritative references
  from Gelfand & Smith (1990) through Stan (Carpenter et al. 2017) and the modern
  Bayesian workflow (van de Schoot et al. 2021). Includes a playbook for the killer
  demo: using KB findings from other packs as informative priors in Bayesian regression.'
