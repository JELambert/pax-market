description: Equity market theory, quantitative trading strategies, technical and
  fundamental analysis, risk management, behavioral finance, and options basics —
  with live data engines for real-time stock analysis. Covers EMH and its violations,
  momentum/value/mean-reversion anomalies, technical indicator theory, portfolio optimization,
  factor models, and options pricing.
